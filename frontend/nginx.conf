server {
    listen 80;
    server_name localhost;

    # Proxy all /api/ requests to backend (must be before the SPA fallback)
    location /api/ {
        proxy_pass http://financials-parser-backend.internal.purpletree-45e026fb.eastus2.azurecontainerapps.io:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # Serve React app
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /upload {
        proxy_pass http://financials-parser-backend.internal.purpletree-45e026fb.eastus2.azurecontainerapps.io;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }

    location /layer1 {
