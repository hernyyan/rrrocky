        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /layer2 {
        proxy_pass http://financials-parser-backend.internal.purpletree-45e026fb.eastus2.azurecontainerapps.io;
