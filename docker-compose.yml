version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: henry
      POSTGRES_PASSWORD: henry
      POSTGRES_DB: henry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U henry -d henry_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://henry:henry@db:5432/henry_db
      - LAYER1_MODEL=claude-sonnet-4-6
      - LAYER2_MODEL=claude-opus-4-6
      - LAYER_A_MODEL=claude-sonnet-4-6
      - LAYER_B_MODEL=claude-opus-4-6
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - company_context:/app/company_context
      - app_data:/app/data
      - uploads:/app/uploads
      - processed:/app/processed
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  company_context:
  app_data:
  uploads:
  processed:
